<!DOCTYPE html>
<html lang="de">
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>PLC TEAM DESIGN | Bad Oeynhausen</title> 
    
    <!-- GOOGLE-VERIFIZIERUNGSCODE --> 
    <meta name="google-site-verification" content="hXvCe_t1mEstDom0kluGGE9olJTBmsdgksjMmIZRnKs" /> 

    <style> 
        /* --- BLOCK 1: GLOBALE EINSTELLUNGEN --- */
        * { box-sizing: border-box !important; }

        :root { 
            --primary-purple: #741fa2; 
            --dark-purple: #4a0072; 
            --gold-accent: #d4af37; 
            --light-bg: #fdfbfe; 
            --text-dark: #111111; 
        } 

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; background-color: var(--light-bg); 
            display: flex; overflow-x: hidden; scroll-behavior: smooth; 
        } 


        /* --- BLOCK 2: SEITENLEISTE (SIDEBAR) --- */
        .sidebar-nav { 
            width: 250px; height: 100vh; background: #fff; 
            border-right: 6px solid var(--gold-accent); 
            position: fixed; display: flex; flex-direction: column; 
            align-items: center; padding: 1.5rem 1rem; z-index: 1000; 
        } 

        .logo-box {
            border: 6px solid var(--gold-accent); border-radius: 4px;
            width: 218px; height: 130px; margin-bottom: 1.5rem;
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; text-decoration: none; transition: 0.3s;
        }
        .logo-box:hover { background-color: var(--primary-purple); }
        .logo-box:hover div { color: #fff !important; }

        .nav-btn {
            width: 218px; height: 52px; border: 6px solid var(--gold-accent); 
            border-radius: 4px; margin-bottom: 1rem; display: flex; 
            align-items: center; justify-content: center; 
            text-decoration: none; font-weight: bold; color: #111; transition: 0.3s;
        } 
        .nav-btn:hover { background-color: var(--primary-purple); color: #fff; }


        /* --- BLOCK 3: HAUPTBEREICH & HEADER --- */
        .main-content { margin-left: 250px; flex: 1; } 

        header { 
            background: linear-gradient(135deg, var(--dark-purple), var(--primary-purple)); 
            padding: 5rem 1rem; text-align: center; border-bottom: 6px solid var(--gold-accent); 
        } 

        /* UNGLEICHMÄSSIGER SILBER-GLANZ (PROPELLER-EFFEKT) */
        .logo-img { 
            width: 100%; max-width: 800px; height: auto; 
            filter: 
                drop-shadow(8px 2px 0px #555555)   /* Schattenseite dunkel */
                drop-shadow(-2px -4px 0px #BBBBBB) /* Glanzkante oben links */
                drop-shadow(0px 0px 15px #FFFFFF); /* Starkes Zentrum-Licht */
        }


        /* --- BLOCK 4: INHALTS-LAYOUT --- */
        .container { max-width: 1100px; margin: 4rem auto; padding: 0 2rem; } 
        .section-title { font-size: 1.8rem; font-weight: 800; color: var(--primary-purple); margin-bottom: 2rem; } 

        .project-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 2rem; 
            margin-top: 2rem; 
        } 

        .project-card { 
            background: #ffffff; 
            border: 1px solid #eeeeee; 
            border-radius: 4px; 
            overflow: hidden; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            transition: 0.3s;
        } 

        .project-img { width: 100%; height: 300px; object-fit: contain; padding: 1rem; } 
        .project-title { padding: 1rem; font-weight: bold; text-align: center; background: #fafafa; border-top: 1px solid #eee; }


        /* --- BLOCK 5: FOOTER --- */
        footer { background: #1e0034; color: #fff; padding: 3rem 1.5rem; border-top: 6px solid var(--gold-accent); } 
        .accordion-trigger { width: 100%; background: none; border: none; color: white; cursor: pointer; text-align: left; padding: 1rem 0; font-weight: bold; }
        .accordion-content { display: none; padding-top: 1rem; }


        /* --- BLOCK 6: MOBIL-ANPASSUNG --- */
        @media (max-width: 768px) { 
            body { flex-direction: column; } 
            .sidebar-nav { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 6px solid var(--gold-accent); } 
            .main-content { margin-left: 0; } 
        } 
    </style>
</head>

<body> 

    <!-- SEITENLEISTE -->
    <div class="sidebar-nav">
        <a href="https://myspreadshop.de" target="_blank" class="logo-box">
            <img src="shop-logo.png" style="width:80%;" alt="Logo">
            <div style="font-weight:bold; color:#111; margin-top:5px;">+ SHOP</div>
        </a>
        <a href="#projekte" class="nav-btn">Projekte</a>
        <a href="#contact" class="nav-btn">Contact</a>
    </div>

    <!-- HAUPTINHALT -->
    <div class="main-content">
        <header>
            <img src="logo.png" alt="PLC Team Design" class="logo-img">
        </header>

        <div class="container">
            <h2 class="section-title">✨ „Designen mit Leidenschaft und Herzblut für technische Produkte & 3D-Objekte sind wir da!“ 💫</h2>

            <!-- PROJEKTE (WIEDERHERGESTELLT) -->
            <section id="projekte">
                <h2 style="color:#111; margin-bottom: 1rem;">Unsere Projekte</h2>
                <div class="project-grid">
                    <div class="project-card">
                        <img src="p1.png" alt="Technische Baugruppe" class="project-img">
                        <div class="project-title">Technische Baugruppe</div>
                    </div>
                    <div class="project-card">
                        <img src="p2.png" alt="3D-Druck Prototyp" class="project-img">
                        <div class="project-title">3D-Druck Prototyp</div>
                    </div>
                </div>
            </section>

            <!-- KONTAKT -->
            <section id="contact" style="margin-top: 4rem;">
                <h2 class="section-title">Kontakt</h2>
                <p>E-Mail: <a href="mailto:plctede@gmail.com">plctede@gmail.com</a></p>
                <p>Telefon: 05731 9829839</p>
            </section>
        </div>

        <footer>
            <button class="accordion-trigger" onclick="toggleLegal()">Impressum & Datenschutz +</button>
            <div id="legal" class="accordion-content">
                PLC TEAM DESIGN | Bad Oeynhausen | Alle Rechte vorbehalten.
            </div>
        </footer>
    </div>

    <script>
        function toggleLegal() {
            var x = document.getElementById("legal");
            x.style.display = (x.style.display === "block") ? "none" : "block";
        }
    </script>

</body>
</html>
